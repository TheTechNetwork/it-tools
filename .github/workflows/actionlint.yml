# Lints the GitHub Actions workflow files themselves (syntax, expression
# errors, deprecated runners, and shellcheck on `run:` scripts). Runs only when
# workflow definitions change, so it stays off the critical path for tool-code
# PRs.

name: actionlint

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          fail-on-error: true
