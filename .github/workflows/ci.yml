# Main CI pipeline: static checks, unit tests with coverage, a single shared
# production build, and E2E tests that reuse that build.
#
# Speed/thoroughness trade-offs:
# - Lint, typecheck and unit tests run once on the primary Node version
#   (their results do not vary across Node versions).
# - The production build runs once and its dist/ artifact is shared with E2E,
#   instead of each workflow rebuilding.
# - PRs run E2E on Chromium only (3 shards); pushes to main run the full
#   Chromium + Firefox + WebKit matrix.
# - Node compatibility (22/25/26 build + test) gates PRs only when they touch
#   dependencies, build tooling or workflows; it always runs on pushes to main
#   and on manual dispatch. Ordinary tool-code PRs stay off that critical path.

name: ci

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint, typecheck and unit tests (with coverage) - run once on the primary
  # Node version since their results are Node-version independent.
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Run linters
        run: pnpm lint --cache --cache-location .eslintcache

      - name: Cache TypeScript build info
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            **/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Type check
        run: pnpm typecheck

      - name: Cache Vitest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules/.vitest
          key: ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Unit tests with coverage
        run: pnpm coverage

      - name: Add coverage to job summary
        if: always()
        run: |
          # shellcheck disable=SC2016  # ${...} below are JS template literals, not shell
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const { total } = require("./coverage/coverage-summary.json");
              const row = k => `| ${k} | ${total[k].pct}% | ${total[k].covered}/${total[k].total} |`;
              console.log("## Unit test coverage\n");
              console.log("| Metric | Coverage | Covered/Total |");
              console.log("| --- | --- | --- |");
              for (const key of ["lines", "statements", "functions", "branches"]) {
                console.log(row(key));
              }
            ' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/lcov-report
          retention-days: 7
          if-no-files-found: ignore

  # Single production build, shared with the E2E jobs below.
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Vite build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules/.vite
            .vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Build app
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 1

  # E2E tests reuse the dist/ artifact from the build job.
  # PRs: Chromium only. Pushes to main: Chromium + Firefox + WebKit.
  e2e:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium", "firefox", "webkit"]') }}
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-24.04-${{ matrix.project }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Install Playwright browser and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}
        timeout-minutes: 5

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.project }}
        timeout-minutes: 10

      - name: Run Playwright tests
        run: pnpm run test:e2e --project=${{ matrix.project }} --shard=${{ matrix.shard }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.project }}-${{ strategy.job-index }}
          path: test-results/
          retention-days: 7

      - name: Save Playwright browsers cache
        if: matrix.shard == '1/3' && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-24.04-${{ matrix.project }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

  # Detect whether a PR touches anything that could affect Node-version
  # compatibility (dependencies, build tooling, workflow definitions) or the
  # Docker image (Dockerfile, docker/, .dockerignore). Ordinary tool-code
  # changes cannot break either if they pass on the primary Node version, so the
  # compat matrix and the Docker image test only run when their inputs change.
  toolchain-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Detect toolchain- and docker-sensitive changes
        id: filter
        run: |
          changed_files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          if grep -qE '^(package\.json|pnpm-lock\.yaml|\.npmrc|vite\.config\.ts|vitest\.setup\.ts|tsconfig[^/]*\.json|\.github/workflows/)' <<<"$changed_files"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '^(Dockerfile|\.dockerignore|docker/|\.github/workflows/ci\.yml)' <<<"$changed_files"; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  # Node compatibility: build + unit tests across other supported Node
  # versions. The primary version (from .nvmrc) is already covered above. Runs on
  # pushes to main and manual dispatch, and gates PRs only when they touch
  # dependencies, build tooling or workflows - the only changes that can
  # realistically break other Node versions.
  node-compat:
    needs: toolchain-changes
    if: >-
      always() &&
      (github.event_name != 'pull_request' || needs.toolchain-changes.outputs.changed == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '25.x', '26.x']
        # Node.js 20 removed - pnpm 11, vue-i18n 11.4.3+, vue-router 5.1 (@babel/generator 8),
        # @antfu/eslint-config 9, and unplugin-vue-markdown 32 all require Node.js 22.13+
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Build each production Docker image variant and verify it end to end: the
  # container serves, nginx variants reach a healthy HEALTHCHECK, and all three
  # serve identically (security headers, gzip, asset caching, SPA fallback) -
  # the shared serving contract that keeps the variants in lockstep. Also scans
  # each image with Trivy: findings are uploaded to GitHub code scanning (the
  # Security tab) and a blocking gate fails the job on a fixable HIGH/CRITICAL
  # (ignore-unfixed keeps un-actionable base-image CVEs from blocking). Gated to
  # Docker changes (via toolchain-changes) so ordinary PRs skip the image
  # builds; always on main.
  docker-image:
    needs: toolchain-changes
    if: >-
      always() &&
      (github.event_name != 'pull_request' || needs.toolchain-changes.outputs.docker == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # security-events: write lets the Trivy SARIF upload reach code scanning.
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # every variant listens on 8080; nginx variants have a HEALTHCHECK,
          # the distroless (no shell) one does not.
          - target: standard
            healthcheck: true
          - target: rootless
            healthcheck: true
          - target: distroless
            healthcheck: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (${{ matrix.target }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.target }}
          load: true
          tags: it-tools:${{ matrix.target }}
          cache-from: type=gha,scope=docker-image-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.target }}

      - name: Run container (${{ matrix.target }})
        run: |
          # Every variant listens on 8080. Health-cadence flags are harmless on
          # the distroless image (it has no HEALTHCHECK).
          docker run -d --name it-tools-ci -p 8080:8080 \
            --health-start-period=2s --health-interval=2s \
            --health-timeout=3s --health-retries=5 \
            it-tools:${{ matrix.target }}

      - name: Wait until it serves
        run: |
          for _ in {1..30}; do
            if curl -fsS -o /dev/null http://localhost:8080/; then echo "serving"; exit 0; fi
            sleep 2
          done
          echo "timed out waiting for the server"; docker logs it-tools-ci; exit 1

      - name: Verify HEALTHCHECK reports healthy
        if: ${{ matrix.healthcheck }}
        run: |
          for _ in {1..30}; do
            status=$(docker inspect -f '{{.State.Health.Status}}' it-tools-ci)
            echo "health: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            if [ "$status" = "unhealthy" ]; then docker logs it-tools-ci; exit 1; fi
            sleep 2
          done
          echo "timed out waiting for healthy"; docker logs it-tools-ci; exit 1

      - name: Assert serving contract (headers, gzip, caching, SPA fallback)
        run: |
          set -eu
          fail() { echo "ASSERT FAILED [${{ matrix.target }}]: $1"; docker logs it-tools-ci || true; exit 1; }

          shell_headers=$(curl -sS -D - -o /dev/null http://localhost:8080/)
          grep -qi '^x-content-type-options: nosniff' <<<"$shell_headers" || fail "X-Content-Type-Options"
          grep -qi '^x-frame-options: SAMEORIGIN' <<<"$shell_headers" || fail "X-Frame-Options"
          grep -qi '^referrer-policy: strict-origin-when-cross-origin' <<<"$shell_headers" || fail "Referrer-Policy"
          grep -qi '^permissions-policy:' <<<"$shell_headers" || fail "Permissions-Policy"
          grep -qi '^cache-control: no-cache' <<<"$shell_headers" || fail "index.html should be no-cache"

          # Asset references come from the served shell; at least one (the entry
          # JS or the stylesheet) is above gzip_min_length and must be gzipped.
          assets=$(curl -sS http://localhost:8080/ | grep -oE '/assets/[^"]+\.(js|css)' | sort -u)
          [ -n "$assets" ] || fail "no /assets references found in index.html"

          gzipped=0
          while IFS= read -r a; do
            [ -n "$a" ] || continue
            if curl -sS -H 'Accept-Encoding: gzip' -D - -o /dev/null "http://localhost:8080$a" \
              | grep -qi '^content-encoding: gzip'; then gzipped=1; break; fi
          done <<<"$assets"
          [ "$gzipped" = 1 ] || fail "no asset was served gzipped"

          first_asset=$(head -1 <<<"$assets")
          grep -qi 'max-age=31536000' \
            <<<"$(curl -sS -D - -o /dev/null "http://localhost:8080$first_asset")" \
            || fail "asset should be long-cached"

          code=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:8080/deep/spa/route)
          [ "$code" = "200" ] || fail "SPA fallback should return 200 (got $code)"

          echo "serving contract holds for ${{ matrix.target }}."

      - name: Stop container
        if: always()
        run: docker rm -f it-tools-ci || true

      # Full audit -> GitHub code scanning (Security tab). Report-only (exit 0)
      # and includes unfixed CVEs, so the Security tab tracks the complete
      # HIGH/CRITICAL exposure (fixable and not) over time and annotates PRs.
      # The blocking gate below is what actually fails the build.
      - name: Trivy full audit (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: it-tools:${{ matrix.target }}
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: false
          format: sarif
          output: 'trivy-${{ matrix.target }}.sarif'
          exit-code: '0'

      - name: Upload Trivy SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: 'trivy-${{ matrix.target }}.sarif'
          category: 'trivy-${{ matrix.target }}'

      # Gate: fails the job only on a *fixable* HIGH/CRITICAL - something an
      # image rebuild or base-image bump can actually resolve.
      - name: Scan image with Trivy (fails on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: it-tools:${{ matrix.target }}
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          format: table
          exit-code: '1'

  # Review dependency changes on PRs: fail when a PR introduces a dependency
  # with a known HIGH/CRITICAL vulnerability. Complements Renovate (which keeps
  # existing deps current) by gating what a change brings in.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
