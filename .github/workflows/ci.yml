# Main CI pipeline: static checks, unit tests with coverage, a single shared
# production build, and E2E tests that reuse that build.
#
# Speed/thoroughness trade-offs:
# - Lint, typecheck and unit tests run once on the primary Node version
#   (their results do not vary across Node versions).
# - The production build runs once and its dist/ artifact is shared with E2E,
#   instead of each workflow rebuilding.
# - PRs run E2E on Chromium only (3 shards); pushes to main run the full
#   Chromium + Firefox + WebKit matrix.
# - Node compatibility (22/25/26 build + test) runs on pushes to main and on
#   manual dispatch, keeping it off the PR critical path.

name: ci

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PRIMARY_NODE_VERSION: '24.x'

jobs:
  # Lint, typecheck and unit tests (with coverage) - run once on the primary
  # Node version since their results are Node-version independent.
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache ESLint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Run linters
        run: pnpm lint --cache --cache-location .eslintcache

      - name: Cache TypeScript build info
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            **/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Type check
        run: pnpm typecheck

      - name: Cache Vitest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules/.vitest
          key: ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Unit tests with coverage
        run: pnpm coverage

      - name: Add coverage to job summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const { total } = require("./coverage/coverage-summary.json");
              const row = k => `| ${k} | ${total[k].pct}% | ${total[k].covered}/${total[k].total} |`;
              console.log("## Unit test coverage\n");
              console.log("| Metric | Coverage | Covered/Total |");
              console.log("| --- | --- | --- |");
              for (const key of ["lines", "statements", "functions", "branches"]) {
                console.log(row(key));
              }
            ' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/lcov-report
          retention-days: 7
          if-no-files-found: ignore

  # Single production build, shared with the E2E jobs below.
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Vite build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules/.vite
            .vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Build app
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 1

  # E2E tests reuse the dist/ artifact from the build job.
  # PRs: Chromium only. Pushes to main: Chromium + Firefox + WebKit.
  e2e:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium", "firefox", "webkit"]') }}
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.PRIMARY_NODE_VERSION }}
          cache: 'pnpm'

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-24.04-${{ matrix.project }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Install Playwright browser and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}
        timeout-minutes: 5

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.project }}
        timeout-minutes: 10

      - name: Run Playwright tests
        run: pnpm run test:e2e --project=${{ matrix.project }} --shard=${{ matrix.shard }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.project }}-${{ strategy.job-index }}
          path: test-results/
          retention-days: 7

      - name: Save Playwright browsers cache
        if: matrix.shard == '1/3' && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-24.04-${{ matrix.project }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

  # Node compatibility: build + unit tests across other supported Node
  # versions. Kept off the PR critical path - runs on pushes to main and on
  # manual dispatch. The primary version (24.x) is already covered above.
  node-compat:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '25.x', '26.x']
        # Node.js 20 removed - pnpm 11, vue-i18n 11.4.3+, vue-router 5.1 (@babel/generator 8),
        # @antfu/eslint-config 9, and unplugin-vue-markdown 32 all require Node.js 22.13+
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
