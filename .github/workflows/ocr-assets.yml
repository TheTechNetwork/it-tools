# Publish the Tesseract OCR assets (engine + every supported language) to the
# first-party R2 bucket behind assets.thetech.network, under a path versioned by
# the tesseract.js version (tesseract/<version>/). The OCR tool fetches them from
# there at runtime, so this keeps the deploy lean and works identically across
# Cloudflare, Vercel, Netlify and Docker.
#
# Runs on manual dispatch, weekly (to pick up new tessdata_fast), and whenever the
# tesseract.js version or the asset scripts change on main. It no-ops (does not
# fail) until the R2_* secrets are configured, so it stays green before the bucket
# is set up.
name: ocr-assets

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 05:00 UTC.
    - cron: '0 5 * * 1'
  push:
    branches: [ "main" ]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/prepare-tesseract.mjs'
      - 'scripts/sync-ocr-assets.mjs'
      - '.github/workflows/ocr-assets.yml'

concurrency:
  group: ocr-assets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check R2 credentials are configured
        id: cfg
        run: echo "configured=${{ secrets.R2_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"

      - name: Note when unconfigured
        if: steps.cfg.outputs.configured != 'true'
        run: echo "R2_* secrets are not set; skipping OCR asset sync. Configure R2_ACCOUNT_ID, R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY to enable it."

      - run: corepack enable
        if: steps.cfg.outputs.configured == 'true'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.cfg.outputs.configured == 'true'
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.cfg.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Prepare assets (engine + all languages)
        if: steps.cfg.outputs.configured == 'true'
        run: OCR_ALL_LANGS=1 pnpm script:ocr:assets

      - name: Upload to R2
        if: steps.cfg.outputs.configured == 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: pnpm script:ocr:sync
