# Runs lint, typecheck, build, and tests across multiple Node.js versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: ci

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: ['20.x', '22.x', '24.x', '25.x']
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        # Node.js 18 removed - unplugin-icons v22+ requires Node.js 20.12+ (uses styleText from node:util)

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - run: corepack enable
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Cache ESLint
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: .eslintcache
        key: ${{ runner.os }}-eslint-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Run linters
      run: pnpm lint --cache --cache-location .eslintcache

    - name: Cache TypeScript build info
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          **/*.tsbuildinfo
        key: ${{ runner.os }}-tsbuildinfo-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Type check
      run: pnpm typecheck

    - name: Cache Vite build
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          node_modules/.vite
          .vite
        key: ${{ runner.os }}-vite-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Build
      run: pnpm build

    - name: Cache Vitest
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          node_modules/.vitest
        key: ${{ runner.os }}-vitest-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Test
      run: pnpm test
