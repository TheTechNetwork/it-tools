# Runs lint, typecheck, build, and tests across multiple Node.js versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: ci

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: ['22.x', '24.x', '25.x', '26.x']
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        # Node.js 20 removed - pnpm 11, vue-i18n 11.4.3+, vue-router 5.1 (@babel/generator 8),
        # @antfu/eslint-config 9, and unplugin-vue-markdown 32 all require Node.js 22.13+

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - run: corepack enable
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Cache ESLint
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .eslintcache
        key: ${{ runner.os }}-eslint-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Run linters
      run: pnpm lint --cache --cache-location .eslintcache

    - name: Cache TypeScript build info
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          **/*.tsbuildinfo
        key: ${{ runner.os }}-tsbuildinfo-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Type check
      run: pnpm typecheck

    - name: Cache Vite build
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          node_modules/.vite
          .vite
        key: ${{ runner.os }}-vite-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Build
      run: pnpm build

    - name: Cache Vitest
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          node_modules/.vitest
        key: ${{ runner.os }}-vitest-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Test
      run: pnpm test
